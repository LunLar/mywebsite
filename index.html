<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lars Henrik Knapper Lunde — Developer Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <style>
    
    *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }

    :root {
    --bg:      #f5f3ef;   /* off-white page background */
    --surface: #ffffff;   /* cards and nav */
    --border:  #e4e0d8;   /* subtle borders */
    --text:    #18180f;   /* near-black */
    --muted:   #7a776d;   /* grey body text */
    --accent:  #1a5c3a;   /* green accent */

    /* Category colours for your project tags */
    --cs-bg: #eef2ff;  --cs-fg: #3730a3;   /* C# — blue */
    --py-bg: #fefce8;  --py-fg: #854d0e;   /* Python — yellow */
    --ml-bg: #fdf2f8;  --ml-fg: #9d174d;   /* ML — pink */
    --and-bg: #ecfdf5; --and-fg: #065f46;  /* Android — green */
}

html { scroll-behavior: smooth; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}



nav {
  position: fixed;    /* stays on screen while scrolling */
  top: 0; left: 0; right: 0;
  z-index: 100;       /* sits on top of everything */
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2.5rem;
  background: rgba(245,243,239,.93);
  backdrop-filter: blur(12px);  /* frosted glass effect */
  border-bottom: 1px solid var(--border);
}

.nav-logo {
  font-family: 'DM Mono', monospace;
  font-size: .85rem;
  color: var(--accent);
  text-decoration: none;
  font-weight: 500;
}

.nav-links { display: flex; gap: 2rem; }

.nav-links a {
  font-size: .85rem;
  color: var(--muted);
  text-decoration: none;
  transition: color .2s;
}

.nav-links a:hover { color: var(--text); }

    

  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">your.name</a>
  <div class="nav-links">
    <a href="#projects">Projects</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
  </div>
</nav>


<main>

  <section id="hero">
    <p class="hero-eyebrow">Portfolio</p>

    <h1>I build things.<br/><em>Code by code.</em></h1>

    <p class="hero-sub">
      I'm <strong>Your Name</strong> — a developer exploring
      C#, Python ML, and Android Compose.
    </p>

    <div class="hero-pills">
      <span class="pill">
        <span class="pill-dot" style="background:#818cf8"></span>C# / .NET
      </span>
      <span class="pill">
        <span class="pill-dot" style="background:#fbbf24"></span>Python
      </span>
      <span class="pill">
        <span class="pill-dot" style="background:#34d399"></span>Android Compose
      </span>
    </div>

    <div class="hero-cta">
      <a href="#projects" class="btn btn-dark">See My Work</a>
      <a href="https://github.com/yourusername" target="_blank" class="btn btn-outline">GitHub →</a>
    </div>
  </section>

</main>

</body>
</html>
